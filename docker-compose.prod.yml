# Production / Coolify deployment.
# Build Pack in Coolify UI: "Docker Compose"
# Docker Compose Location: /docker-compose.prod.yml
#
# Coolify's Traefik exposes the `frontend` service externally on the chosen
# domain; SSL is terminated by Traefik. Inside this stack, nginx in the
# frontend container serves the SPA and reverse-proxies /api/* to backend.

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-domainmanager}
      POSTGRES_USER: ${POSTGRES_USER:-dmuser}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-dmuser}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.prod
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-dmuser}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-domainmanager}
      SECRET_KEY: ${SECRET_KEY}
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES:-480}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      TELEGRAM_CHAT_ID: ${TELEGRAM_CHAT_ID:-}
    volumes:
      - hydroxide_data:/data
    depends_on:
      db:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"

  hydroxide:
    build:
      context: ./hydroxide
      dockerfile: Dockerfile
    restart: unless-stopped
    volumes:
      - hydroxide_data:/data

  # The publicly-routable service. Coolify points its Traefik at this container's :80.
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
    restart: unless-stopped
    ports:
      - "80"
    depends_on:
      - backend

volumes:
  postgres_data:
  hydroxide_data:
