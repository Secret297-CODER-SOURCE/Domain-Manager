# Production / Coolify deployment.
# Build Pack in Coolify UI: "Docker Compose"
# Docker Compose Location: /docker-compose.prod.yml
#
# Coolify's Traefik exposes the `frontend` service externally on the chosen
# domain; SSL is terminated by Traefik. Inside this stack, nginx in the
# frontend container serves the SPA and reverse-proxies /api/* to backend.

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-domainmanager}
      POSTGRES_USER: ${POSTGRES_USER:-dmuser}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-YSqHLCL7aFNDuugRQEl9DJVG0fgpQt}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-dmuser} -d ${POSTGRES_DB:-domainmanager}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.prod
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-dmuser}:${POSTGRES_PASSWORD:-YSqHLCL7aFNDuugRQEl9DJVG0fgpQt}@db:5432/${POSTGRES_DB:-domainmanager}
      SECRET_KEY: ${SECRET_KEY:-8e52870ec959d6189d7564219781eb63d9e51fe5a94af3872bd5530a14af9502}
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES:-480}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-8650037279:AAF-vaBa8I4xnvHRPgH2TAlYpWHE5mbpTcg}
      TELEGRAM_CHAT_ID: ${TELEGRAM_CHAT_ID:-}
    volumes:
      - hydroxide_data:/data
    depends_on:
      db:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"

  hydroxide:
    build:
      context: ./hydroxide
      dockerfile: Dockerfile
    restart: unless-stopped
    volumes:
      - hydroxide_data:/data

  # The publicly-routable service. Coolify Traefik routes domain → :80 inside.
  # Port 8080 also published on host so you can reach the app via
  # http://<server-ip>:8080 without configuring a domain.
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
    restart: unless-stopped
    ports:
      - "8080:80"
    depends_on:
      - backend

volumes:
  postgres_data:
  hydroxide_data:
