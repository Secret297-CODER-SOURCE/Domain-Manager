# Single-server nginx config used inside the frontend container.
# - Static SPA at /
# - /api/* and /docs proxied to the backend service
# - WebSocket upgrade headers passed through (terminal, hot iframe-proxy)
# SSL is handled by Coolify's Traefik in front of this container — we listen
# plain HTTP on :80.

map $http_upgrade $connection_upgrade {
    default upgrade;
    '' close;
}

server {
    listen 80;
    server_name _;
    client_max_body_size 2g;

    # Reverse-proxy API + docs to FastAPI
    location ~ ^/(api|docs|openapi.json|redoc)(/|$) {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
        proxy_request_buffering off;

        # WebSocket upgrade for /api/servers/ws/* and any embedded socket.io
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
    }

    # SPA: serve built Vite bundle, fall back to index.html for client routes
    location / {
        root /usr/share/nginx/html;
        try_files $uri $uri/ /index.html;
        expires 1d;
        add_header Cache-Control "public, must-revalidate";
    }

    # Long-cached hashed assets
    location /assets/ {
        root /usr/share/nginx/html;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
