events { worker_connections 1024; }

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;
    sendfile on;
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/javascript;

    upstream backend { server backend:8000; }

    # ── Drop any request by IP or unknown host ────────────────────────────────
    server {
        listen 80 default_server;
        listen 443 ssl default_server;
        server_name _;

        ssl_certificate     /etc/letsencrypt/live/domain-manage.tech/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/domain-manage.tech/privkey.pem;

        return 444;
    }

    # ── HTTP → HTTPS redirect + Let's Encrypt challenge ───────────────────────
    server {
        listen 80;
        server_name domain-manage.tech www.domain-manage.tech;

        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://domain-manage.tech$request_uri;
        }
    }

    # ── HTTPS ─────────────────────────────────────────────────────────────────
    server {
        listen 443 ssl http2;
        server_name domain-manage.tech www.domain-manage.tech;

        ssl_certificate     /etc/letsencrypt/live/domain-manage.tech/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/domain-manage.tech/privkey.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;
        ssl_session_cache   shared:SSL:10m;

        # www → без www
        if ($host = www.domain-manage.tech) {
            return 301 https://domain-manage.tech$request_uri;
        }

        location /api/ {
            proxy_pass http://backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 300s;
            proxy_send_timeout 300s;
        }

        location / {
            root /usr/share/nginx/html;
            try_files $uri $uri/ /index.html;
            expires 1d;
            add_header Cache-Control "public, must-revalidate";
        }
    }
}
